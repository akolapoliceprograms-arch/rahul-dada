<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive VIP Invitation</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="container">
        <header class="header">
            <h1>Exclusive VIP Event</h1>
            <p>You are cordially invited. Please confirm your details below to secure your spot.</p>
        </header>

        <form id="invitationForm" class="invite-form">
            <div class="form-group photo-upload-group">
                <label for="photo" class="upload-label">
                    <div class="upload-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    </div>
                    <span>Upload Your Photo</span>
                </label>
                <input type="file" id="photo" name="photo" accept="image/*" class="file-input" required>
                <div id="photoPreview" class="photo-preview hidden"></div>
            </div>

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="e.g. John Doe" required>
            </div>

            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" placeholder="e.g. +1 234 567 8900" required>
            </div>

            <div class="form-group ip-group">
                <label for="ipAddress">Security Verification (Auto-detected IP)</label>
                <div class="input-with-icon">
                    <input type="text" id="ipAddress" name="ipAddress" readonly placeholder="Detecting IP...">
                    <span class="lock-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Confirm Attendance</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </form>

        <div id="successMessage" class="success-message hidden">
            <div class="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            </div>
            <h2>Invitation Accepted!</h2>
            <p>Your details have been securely saved. We look forward to seeing you at the event.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
